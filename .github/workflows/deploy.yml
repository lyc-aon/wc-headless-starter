name: Deploy Alyve to SiteGround

# Alyve-only CD pipeline for Shahab-Awan/wc-headless-starter.
# Pushes to main deploy only alyvepeptides.com. The upstream
# lyc-aon/wc-headless-starter repo is manual-only and should not
# deploy shared client fleets from ordinary pushes.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: deploy-alyve-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skip-check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ contains(github.event.head_commit.message, '[skip deploy]') }}
    steps:
      - run: echo "Skip = ${{ contains(github.event.head_commit.message, '[skip deploy]') }}"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spa/package-lock.json

      - name: Install SPA deps
        working-directory: spa
        run: npm ci

      - name: Type-check
        working-directory: spa
        run: npm run check

      - name: Build SPA
        working-directory: spa
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: spa-build
          path: spa/build/
          retention-days: 7
          if-no-files-found: error

  deploy-alyve:
    needs: build
    runs-on: ubuntu-latest
    env:
      SG_DOMAIN: ${{ secrets.ALYVE_SG_DOMAIN }}
    steps:
      - name: Validate deploy secrets
        env:
          SSH_KEY: ${{ secrets.ALYVE_SG_SSH_KEY }}
          SG_HOST: ${{ secrets.ALYVE_SG_HOST }}
          SG_USER: ${{ secrets.ALYVE_SG_USER }}
        run: |
          missing=0
          if [[ -z "$SSH_KEY" ]]; then echo "::error::ALYVE_SG_SSH_KEY is not set"; missing=1; fi
          if [[ -z "$SG_HOST" ]]; then echo "::error::ALYVE_SG_HOST is not set"; missing=1; fi
          if [[ -z "$SG_USER" ]]; then echo "::error::ALYVE_SG_USER is not set"; missing=1; fi
          if [[ -z "$SG_DOMAIN" ]]; then echo "::error::ALYVE_SG_DOMAIN is not set"; missing=1; fi
          if [[ "$missing" != "0" ]]; then exit 1; fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: spa-build
          path: spa/build/

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.ALYVE_SG_SSH_KEY }}
          SG_HOST: ${{ secrets.ALYVE_SG_HOST }}
          SG_USER: ${{ secrets.ALYVE_SG_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          {
            echo "Host sg-target"
            echo "  HostName $SG_HOST"
            echo "  User $SG_USER"
            echo "  Port 18765"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  IdentitiesOnly yes"
            echo "  StrictHostKeyChecking accept-new"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          ssh sg-target 'echo ok; pwd' > /dev/null

      - name: Deploy mu-plugins
        run: |
          ssh sg-target "test -d ~/www/${SG_DOMAIN}/public_html" || {
            echo "::error::Remote webroot missing: ~/www/${SG_DOMAIN}/public_html"
            exit 1
          }
          rsync -az --delete \
            --exclude='*.tmp*' \
            wp/mu-plugins/ \
            "sg-target:~/www/${SG_DOMAIN}/public_html/wp-content/mu-plugins/"

      - name: Deploy .htaccess
        run: |
          rsync -az \
            bin/templates/htaccess.template \
            "sg-target:~/www/${SG_DOMAIN}/public_html/.htaccess"

      - name: Hydrate SPA shell SEO
        run: |
          CONFIG_FILE="$(mktemp)"
          ssh sg-target "curl -sk -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1/wp-json/wchs/v1/config?bust=$RANDOM'" > "$CONFIG_FILE"
          python3 scripts/hydrate-spa-shell-seo.py \
            --index spa/build/index.html \
            --manifest spa/build/site.webmanifest \
            --config "$CONFIG_FILE" \
            --domain "$SG_DOMAIN"

      - name: Deploy SPA build
        run: |
          rsync -az \
            --exclude='wp/' \
            --exclude='wp-admin/' \
            --exclude='wp-includes/' \
            --exclude='wp-content/' \
            --exclude='wp-*.php' \
            --exclude='xmlrpc.php' \
            --exclude='license.txt' \
            --exclude='readme.html' \
            --exclude='.htaccess' \
            --exclude='php_errorlog' \
            --exclude='robots.txt' \
            --exclude='config/' \
            --exclude='setup-fresh-site.sh' \
            --exclude='favicon.ico' \
            --exclude='favicon.png' \
            --exclude='apple-touch-icon.png' \
            --exclude='app/' \
            spa/build/ \
            "sg-target:~/www/${SG_DOMAIN}/public_html/"

      - name: Deploy headless-shim theme
        run: |
          rsync -az --delete \
            wp/themes/headless-shim/ \
            "sg-target:~/www/${SG_DOMAIN}/public_html/wp-content/themes/headless-shim/"

      - name: Lint deployed PHP
        run: |
          ssh sg-target "cd ~/www/${SG_DOMAIN}/public_html && \
            find wp-content/mu-plugins -maxdepth 2 -name '*.php' -exec php -l {} \; 2>&1 | grep -v 'No syntax errors' || true"

      - name: Flush SiteGround dynamic cache
        run: |
          ssh sg-target 'site-tools-client -j domain update id=1 flush_cache=1' > /dev/null || \
            echo "::warning::cache flush failed (non-fatal)"

      - name: Smoke test Alyve
        run: |
          RESP=$(ssh sg-target "curl -sk -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1/wp-json/wchs/v1/config?bust=$RANDOM'")
          export RESP
          python3 - <<'PY'
          import json
          import os
          import sys

          resp = os.environ.get("RESP", "")
          try:
              data = json.loads(resp)
          except json.JSONDecodeError as exc:
              print("::error::config endpoint returned invalid JSON")
              print(f"decode_error: {exc}")
              print(f"response_prefix: {resp[:400]}")
              sys.exit(1)

          required = ("brand_name", "spa_origin", "wp_origin")
          missing = [key for key in required if not data.get(key)]
          if missing:
              print("::error::config endpoint smoke failed")
              print(f"missing_keys: {', '.join(missing)}")
              print(f"response_prefix: {resp[:400]}")
              sys.exit(1)

          if data.get("brand_name") != "Alyve Peptides":
              print("::error::Alyve deploy smoke received unexpected brand")
              print(f"brand_name={data.get('brand_name')!r}")
              sys.exit(1)

          print("config endpoint responding for Alyve")
          PY

          for ROUTE in /account /shop; do
            PROBE=$(ssh sg-target "curl -sk -o /dev/null -w '%{http_code} %{redirect_url}' -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1${ROUTE}'")
            STATUS="${PROBE%% *}"
            REDIRECT="${PROBE#* }"
            if [[ "$STATUS" != "200" || -n "$REDIRECT" ]]; then
              echo "::error::SPA route smoke failed for ${ROUTE}"
              echo "probe: ${PROBE}"
              exit 1
            fi
            echo "${ROUTE} serves the SPA shell"
          done

          SHOP_HEADERS=$(ssh sg-target "curl -skI -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1/shop?seo-smoke=$RANDOM'")
          if ! grep -qi '^x-wchs-seo-shell: 1' <<< "$SHOP_HEADERS"; then
            echo "::error::SEO shell smoke failed for /shop"
            echo "$SHOP_HEADERS"
            exit 1
          fi
          echo "/shop served through WCHS SEO shell"

          for WP_ROUTE in /cart /checkout /my-account; do
            WP_HEADERS=$(ssh sg-target "curl -skI -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1${WP_ROUTE}?seo-smoke=$RANDOM'")
            if grep -qi '^x-wchs-seo-shell:' <<< "$WP_HEADERS"; then
              echo "::error::WP-owned route was intercepted by WCHS SEO shell: ${WP_ROUTE}"
              echo "$WP_HEADERS"
              exit 1
            fi
            echo "${WP_ROUTE} remains WP-owned"
          done

      - name: Verify remote domain alignment
        env:
          DOMAIN: ${{ secrets.ALYVE_SG_DOMAIN }}
          SSH_HOST: sg-target
        run: |
          bash bin/templates/verify-domain-alignment.sh

      - name: Summary
        run: |
          echo "### ${SG_DOMAIN} deployed from Shahab-Awan/wc-headless-starter" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: Alyve only" >> "$GITHUB_STEP_SUMMARY"
          echo "- mu-plugins + .htaccess + SPA build + theme rsynced" >> "$GITHUB_STEP_SUMMARY"
          echo "- SG cache flushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Alyve smoke checks passed" >> "$GITHUB_STEP_SUMMARY"
