name: Deploy to SiteGround

# Manual upstream deploy pipeline. The canonical starter no longer
# deploys on push; client-owned forks should carry their own
# single-target auto-deploy workflows.
# Builds the SPA once, then rsyncs mu-plugins + build output to the
# selected configured SiteGround site(s).
#
# Secrets live in repo settings - see .github/workflows/README.md
# or ask: gh secret list.

on:
  workflow_dispatch:
    inputs:
      sites:
        description: 'Which sites to deploy'
        required: true
        default: 'both'
        type: choice
        options: [both, site1, site2]

concurrency:
  # One deploy at a time per branch — a newer push cancels an in-flight
  # deploy to avoid overlapping rsyncs against the same webroot.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spa/package-lock.json

      - name: Install SPA deps
        working-directory: spa
        run: npm ci

      - name: Type-check
        working-directory: spa
        run: npm run check

      - name: Build SPA
        working-directory: spa
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: spa-build
          path: spa/build/
          retention-days: 7
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # Matrix fans out across both sites in parallel. Each row carries
    # only the secret *names* — values resolve at step time via the
    # secrets context. Never log matrix values; rsync -q keeps them
    # out of build output.
    strategy:
      fail-fast: false
      matrix:
        include:
          - site: site1
            key_secret: SG_SSH_KEY_SITE1
            host_secret: SG_HOST_SITE1
            user_secret: SG_USER_SITE1
            domain_secret: SG_DOMAIN_SITE1
          - site: site2
            key_secret: SG_SSH_KEY_SITE2
            host_secret: SG_HOST_SITE2
            user_secret: SG_USER_SITE2
            domain_secret: SG_DOMAIN_SITE2

    steps:
      - name: Skip if workflow_dispatch selected other site
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ github.event.inputs.sites }}" in
              both) echo "run=true" >> "$GITHUB_OUTPUT" ;;
              ${{ matrix.site }}) echo "run=true" >> "$GITHUB_OUTPUT" ;;
              *) echo "run=false" >> "$GITHUB_OUTPUT" ;;
            esac
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Download build artifact
        if: steps.gate.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          name: spa-build
          path: spa/build/

      - name: Configure SSH
        if: steps.gate.outputs.run == 'true'
        env:
          SSH_KEY: ${{ secrets[matrix.key_secret] }}
          SG_HOST: ${{ secrets[matrix.host_secret] }}
          SG_USER: ${{ secrets[matrix.user_secret] }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          {
            echo "Host sg-target"
            echo "  HostName $SG_HOST"
            echo "  User $SG_USER"
            echo "  Port 18765"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  IdentitiesOnly yes"
            echo "  StrictHostKeyChecking accept-new"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          # Smoke test the connection before touching the filesystem.
          ssh sg-target 'echo ok; pwd' > /dev/null

      - name: Deploy mu-plugins
        if: steps.gate.outputs.run == 'true'
        env:
          SG_DOMAIN: ${{ secrets[matrix.domain_secret] }}
        run: |
          ssh sg-target "test -d ~/www/${SG_DOMAIN}/public_html" || {
            echo "::error::Remote webroot missing: ~/www/${SG_DOMAIN}/public_html"
            exit 1
          }
          rsync -az --delete \
            --exclude='*.tmp*' \
            wp/mu-plugins/ \
            "sg-target:~/www/${SG_DOMAIN}/public_html/wp-content/mu-plugins/"

      - name: Deploy .htaccess
        if: steps.gate.outputs.run == 'true'
        env:
          SG_DOMAIN: ${{ secrets[matrix.domain_secret] }}
        run: |
          rsync -az \
            bin/templates/htaccess.template \
            "sg-target:~/www/${SG_DOMAIN}/public_html/.htaccess"

      - name: Hydrate SPA shell SEO
        if: steps.gate.outputs.run == 'true'
        env:
          SG_DOMAIN: ${{ secrets[matrix.domain_secret] }}
        run: |
          CONFIG_FILE="$(mktemp)"
          ssh sg-target "curl -sk -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1/wp-json/wchs/v1/config?bust=$RANDOM'" > "$CONFIG_FILE"
          python3 scripts/hydrate-spa-shell-seo.py \
            --index spa/build/index.html \
            --manifest spa/build/site.webmanifest \
            --config "$CONFIG_FILE" \
            --domain "$SG_DOMAIN"

      - name: Deploy SPA build
        if: steps.gate.outputs.run == 'true'
        env:
          SG_DOMAIN: ${{ secrets[matrix.domain_secret] }}
        run: |
          # Sync everything from spa/build/ to the webroot. Exclude all
          # the WP-owned paths so we never touch WP's own files, plus
          # a few per-site assets we don't regenerate on every deploy.
          rsync -az \
            --exclude='wp/' \
            --exclude='wp-admin/' \
            --exclude='wp-includes/' \
            --exclude='wp-content/' \
            --exclude='wp-*.php' \
            --exclude='xmlrpc.php' \
            --exclude='license.txt' \
            --exclude='readme.html' \
            --exclude='.htaccess' \
            --exclude='php_errorlog' \
            --exclude='robots.txt' \
            --exclude='config/' \
            --exclude='setup-fresh-site.sh' \
            --exclude='favicon.ico' \
            --exclude='favicon.png' \
            --exclude='apple-touch-icon.png' \
            --exclude='app/' \
            spa/build/ \
            "sg-target:~/www/${SG_DOMAIN}/public_html/"

      - name: Deploy headless-shim theme
        if: steps.gate.outputs.run == 'true'
        env:
          SG_DOMAIN: ${{ secrets[matrix.domain_secret] }}
        run: |
          rsync -az --delete \
            wp/themes/headless-shim/ \
            "sg-target:~/www/${SG_DOMAIN}/public_html/wp-content/themes/headless-shim/"

      - name: Lint deployed PHP
        if: steps.gate.outputs.run == 'true'
        env:
          SG_DOMAIN: ${{ secrets[matrix.domain_secret] }}
        run: |
          ssh sg-target "cd ~/www/${SG_DOMAIN}/public_html && \
            find wp-content/mu-plugins -maxdepth 2 -name '*.php' -exec php -l {} \; 2>&1 | grep -v 'No syntax errors' || true"

      - name: Flush SiteGround dynamic cache
        if: steps.gate.outputs.run == 'true'
        run: |
          ssh sg-target 'site-tools-client -j domain update id=1 flush_cache=1' > /dev/null || \
            echo "::warning::cache flush failed (non-fatal)"

      - name: Smoke test live site
        if: steps.gate.outputs.run == 'true'
        env:
          SG_DOMAIN: ${{ secrets[matrix.domain_secret] }}
        run: |
          # Fetch /wp-json/wchs/v1/config via the site's own nginx
          # (bypasses SG captcha which fires from unknown origins).
          RESP=$(ssh sg-target "curl -sk -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1/wp-json/wchs/v1/config?bust=$RANDOM'")
          export RESP
          python3 - <<'PY'
          import json
          import os
          import sys

          resp = os.environ.get("RESP", "")
          try:
              data = json.loads(resp)
          except json.JSONDecodeError as exc:
              print("::error::config endpoint returned invalid JSON")
              print(f"decode_error: {exc}")
              print(f"response_prefix: {resp[:400]}")
              sys.exit(1)

          required = ("brand_name", "spa_origin", "wp_origin")
          missing = [key for key in required if not data.get(key)]
          if missing:
              print("::error::config endpoint smoke failed")
              print(f"missing_keys: {', '.join(missing)}")
              print(f"response_prefix: {resp[:400]}")
              sys.exit(1)

          print("✓ config endpoint responding")
          PY

          for ROUTE in /account /shop; do
            PROBE=$(ssh sg-target "curl -sk -o /dev/null -w '%{http_code} %{redirect_url}' -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1${ROUTE}'")
            STATUS="${PROBE%% *}"
            REDIRECT="${PROBE#* }"
            if [[ "$STATUS" != "200" || -n "$REDIRECT" ]]; then
              echo "::error::SPA route smoke failed for ${ROUTE}"
              echo "probe: ${PROBE}"
              exit 1
            fi
            echo "✓ ${ROUTE} serves the SPA shell"
          done

          SHOP_HEADERS=$(ssh sg-target "curl -skI -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1/shop?seo-smoke=$RANDOM'")
          if ! grep -qi '^x-wchs-seo-shell: 1' <<< "$SHOP_HEADERS"; then
            echo "::error::SEO shell smoke failed for /shop"
            echo "$SHOP_HEADERS"
            exit 1
          fi
          echo "✓ /shop served through WCHS SEO shell"

          for WP_ROUTE in /cart /checkout /my-account; do
            WP_HEADERS=$(ssh sg-target "curl -skI -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1${WP_ROUTE}?seo-smoke=$RANDOM'")
            if grep -qi '^x-wchs-seo-shell:' <<< "$WP_HEADERS"; then
              echo "::error::WP-owned route was intercepted by WCHS SEO shell: ${WP_ROUTE}"
              echo "$WP_HEADERS"
              exit 1
            fi
            echo "✓ ${WP_ROUTE} remains WP-owned"
          done

          HOME_HTML=$(ssh sg-target "curl -sk -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1/?seo-smoke=$RANDOM'")
          MANIFEST_HEADERS=$(ssh sg-target "curl -skI -H 'Host: ${SG_DOMAIN}' 'https://127.0.0.1/site.webmanifest?seo-smoke=$RANDOM'")
          export HOME_HTML MANIFEST_HEADERS
          python3 - <<'PY'
          import os
          import re
          import sys

          html = os.environ.get("HOME_HTML", "")
          title = re.search(r"<title[^>]*>(.*?)</title>", html, re.I | re.S)
          desc = re.search(r'<meta[^>]+name=["\']description["\'][^>]+content=["\']([^"\']+)', html, re.I | re.S)
          title_text = re.sub(r"\s+", " ", title.group(1)).strip() if title else ""
          desc_text = re.sub(r"\s+", " ", desc.group(1)).strip() if desc else ""
          bad = "Stock WordPress and WooCommerce"
          if not title_text or not desc_text:
              print("::error::SPA shell SEO smoke failed: missing title or meta description")
              print(f"title={title_text!r} description={desc_text!r}")
              sys.exit(1)
          if title_text == "WCHS" or bad in desc_text:
              print("::error::SPA shell SEO smoke failed: starter SEO leaked into deployed shell")
              print(f"title={title_text!r} description={desc_text!r}")
              sys.exit(1)
          manifest_headers = os.environ.get("MANIFEST_HEADERS", "")
          manifest_ct = ""
          for line in manifest_headers.splitlines():
              if line.lower().startswith("content-type:"):
                  manifest_ct = line.split(":", 1)[1].strip().lower()
                  break
          if "application/manifest+json" not in manifest_ct and "application/json" not in manifest_ct:
              print("::error::site.webmanifest is not being served as JSON")
              print(f"content_type={manifest_ct!r}")
              sys.exit(1)
          print(f"✓ SPA shell SEO title={title_text!r}")
          PY

      - name: Verify remote domain alignment
        if: steps.gate.outputs.run == 'true'
        env:
          DOMAIN: ${{ secrets[matrix.domain_secret] }}
          SSH_HOST: sg-target
        run: |
          bash bin/templates/verify-domain-alignment.sh

      - name: Summary
        if: steps.gate.outputs.run == 'true'
        env:
          SG_DOMAIN: ${{ secrets[matrix.domain_secret] }}
        run: |
          echo "### ${SG_DOMAIN} — deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- mu-plugins + .htaccess + SPA build + theme rsynced" >> "$GITHUB_STEP_SUMMARY"
          echo "- SG cache flushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Config endpoint smoke ✓" >> "$GITHUB_STEP_SUMMARY"
          echo "- Direct SPA route smoke (/account, /shop) ✓" >> "$GITHUB_STEP_SUMMARY"
          echo "- Domain alignment verified (siteurl/home/WCHS/robots/config) ✓" >> "$GITHUB_STEP_SUMMARY"
